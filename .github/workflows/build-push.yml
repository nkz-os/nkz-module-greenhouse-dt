# =============================================================================
# Greenhouse Digital Twin - GitHub Actions CI/CD
# =============================================================================
# On push to main:
#   1. Type-check frontend + run backend tests
#   2. Build frontend IIFE bundle (dist/ with mf-manifest.json)
#   3. Build and push backend Docker image to GHCR
#   4. Publish MF2 module via OIDC workflow
#
# On tag push v*:
#   1-3 (same as above, without publish)
#
# Secrets (org-level, inherited automatically):
#   - INTERNAL_SERVICE_SECRET: for OIDC publish endpoint
#   - GITHUB_TOKEN: auto-injected for GHCR push
# =============================================================================

name: Build and Push

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/backend

jobs:
  # ==========================================================================
  # Test
  # ==========================================================================
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run typecheck

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run backend tests
        run: |
          POSTGRES_URL="postgresql://test:test@localhost:5432/test" \
          INTERNAL_SERVICE_SECRET="test-secret" \
          python -m pytest backend/tests/ -v

  # ==========================================================================
  # Build frontend IIFE bundle (dist/ with mf-manifest.json)
  # ==========================================================================
  build-module:
    name: Build Frontend Bundle
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build module bundle
        run: pnpm run build
        env:
          NKZ_VERSION_HASH: ${{ github.sha }}

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ==========================================================================
  # Build and push backend Docker image to GHCR
  # ==========================================================================
  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Backend
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: backend/
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==========================================================================
  # Publish MF2 remote (main only) via canonical OIDC workflow
  # ==========================================================================
  publish-module:
    name: Publish Module (OIDC)
    needs: [test, build-module]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    uses: nkz-os/nkz/.github/workflows/_publish-module.yml@main
    with:
      module_id: greenhouse-dt
    secrets:
      INTERNAL_SERVICE_SECRET: ${{ secrets.INTERNAL_SERVICE_SECRET }}
