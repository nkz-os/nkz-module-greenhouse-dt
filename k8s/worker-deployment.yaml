# k8s/worker-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: greenhouse-dt-worker
  namespace: nekazari
  labels:
    app: greenhouse-dt-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: greenhouse-dt-worker
  template:
    metadata:
      labels:
        app: greenhouse-dt-worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/nkz-os/nkz-module-greenhouse-dt/backend:latest
          command: ["celery", "-A", "app.celery_app:celery_app", "worker", "--loglevel=info"]
          env:
            - name: ORION_LD_URL
              value: "http://orion-ld-service:1026"
            - name: CELERY_BROKER_URL
              value: "redis://redis-service:6379/1"
            - name: CELERY_BACKEND_URL
              value: "redis://redis-service:6379/2"
            - name: TIMESERIES_READER_URL
              value: "http://timeseries-reader-service:5000"
            - name: CONTEXT_URL
              value: "http://api-gateway-service:5000/ngsi-ld-context.json"
            - name: INTERNAL_SERVICE_SECRET
              valueFrom:
                secretKeyRef:
                  name: internal-service-secret
                  key: secret
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
