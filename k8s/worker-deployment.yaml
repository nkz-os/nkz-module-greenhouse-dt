# k8s/worker-deployment.yaml
# Non-sensitive env vars come from greenhouse-dt-config ConfigMap (gitops-config).
# Secrets use SecretKeyRef. No production domains in this file.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: greenhouse-dt-worker
  namespace: nekazari
  labels:
    app: greenhouse-dt-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: greenhouse-dt-worker
  template:
    metadata:
      labels:
        app: greenhouse-dt-worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/nkz-os/nkz-module-greenhouse-dt/backend@sha256:03bc558d8fd09d327afad17972fabcce7fbb938291558a740fdaa9c8317a7888
          command: ["celery", "-A", "app.celery_app:celery_app", "worker", "--loglevel=info"]
          envFrom:
            - configMapRef:
                name: greenhouse-dt-config
                optional: true
          env:
            # ── Secrets ──────────────────────────────────────────
            - name: REQUIRE_HMAC_SIGNATURE
              value: "true"
            - name: HMAC_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: secret
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: password
            - name: INTERNAL_SERVICE_SECRET
              valueFrom:
                secretKeyRef:
                  name: internal-service-secret
                  key: INTERNAL_SERVICE_SECRET
            # ── Derived (use secrets) ────────────────────────────
            - name: CELERY_BROKER_URL
              value: "redis://:$(REDIS_PASSWORD)@redis-service:6379/1"
            - name: CELERY_BACKEND_URL
              value: "redis://:$(REDIS_PASSWORD)@redis-service:6379/2"
          startupProbe:
            exec:
              command: ["pgrep", "-f", "celery"]
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 15
          livenessProbe:
            exec:
              command: ["pgrep", "-f", "celery"]
            periodSeconds: 30
            initialDelaySeconds: 60
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
