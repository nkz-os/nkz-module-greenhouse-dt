# k8s/backend-deployment.yaml
# Non-sensitive env vars come from greenhouse-dt-config ConfigMap (gitops-config).
# Secrets use SecretKeyRef. No production domains in this file.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: greenhouse-dt-backend
  namespace: nekazari
  labels:
    app: greenhouse-dt-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: greenhouse-dt-backend
  template:
    metadata:
      labels:
        app: greenhouse-dt-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/nkz-os/nkz-module-greenhouse-dt/backend@sha256:03bc558d8fd09d327afad17972fabcce7fbb938291558a740fdaa9c8317a7888
          ports:
            - containerPort: 8420
              name: http
          envFrom:
            - configMapRef:
                name: greenhouse-dt-config
                optional: true
          env:
            # ── Secrets ──────────────────────────────────────────
            - name: REQUIRE_HMAC_SIGNATURE
              value: "true"
            - name: HMAC_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: secret
            - name: POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: postgres-url
            - name: INTERNAL_SERVICE_SECRET
              valueFrom:
                secretKeyRef:
                  name: internal-service-secret
                  key: INTERNAL_SERVICE_SECRET
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: access-key
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: secret-key
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: password
            # ── Derived (use secrets) ────────────────────────────
            - name: CELERY_BROKER_URL
              value: "redis://:$(REDIS_PASSWORD)@redis-service:6379/1"
            - name: CELERY_BACKEND_URL
              value: "redis://:$(REDIS_PASSWORD)@redis-service:6379/2"
          startupProbe:
            httpGet:
              path: /health
              port: 8420
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 8420
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8420
            periodSeconds: 20
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
