# k8s/backend-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: greenhouse-dt-backend
  namespace: nekazari
  labels:
    app: greenhouse-dt-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: greenhouse-dt-backend
  template:
    metadata:
      labels:
        app: greenhouse-dt-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/nkz-os/nkz-module-greenhouse-dt/backend@sha256:9b36502e9013c7944cae5f41c34531b2e5210525fbe2aa6f9a88d18c41abcd4c
          ports:
            - containerPort: 8420
              name: http
          env:
            - name: ORION_LD_URL
              value: "http://orion-ld-service:1026"
            - name: REDIS_URL
              value: "redis://redis-service:6379/0"
            - name: POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: postgres-url
            - name: INTERNAL_SERVICE_SECRET
              valueFrom:
                secretKeyRef:
                  name: internal-service-secret
                  key: INTERNAL_SERVICE_SECRET
            - name: MINIO_ENDPOINT
              value: "http://minio-service:9000"
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: access-key
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: secret-key
            - name: CORS_ORIGINS
              # Production domain set via gitops-config overlay
              value: '["https://YOUR_DOMAIN","http://localhost:3000"]'
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: password
            - name: CELERY_BROKER_URL
              value: "redis://:$(REDIS_PASSWORD)@redis-service:6379/1"
            - name: CELERY_BACKEND_URL
              value: "redis://:$(REDIS_PASSWORD)@redis-service:6379/2"
          startupProbe:
            httpGet:
              path: /health
              port: 8420
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 8420
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8420
            periodSeconds: 20
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
