# k8s/backend-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: greenhouse-dt-backend
  namespace: nekazari
  labels:
    app: greenhouse-dt-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: greenhouse-dt-backend
  template:
    metadata:
      labels:
        app: greenhouse-dt-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/nkz-os/nkz-module-greenhouse-dt/backend@sha256:4ebd4422c0f27c974a9bbfb833d289d8a4e29b08a9306c462be5ba2433594d37
          ports:
            - containerPort: 8430
              name: http
          env:
            - name: ORION_LD_URL
              value: "http://orion-ld-service:1026"
            - name: REDIS_URL
              value: "redis://redis-service:6379/0"
            - name: POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: url
            - name: INTERNAL_SERVICE_SECRET
              valueFrom:
                secretKeyRef:
                  name: internal-service-secret
                  key: secret
            - name: MINIO_ENDPOINT
              value: "http://minio-service:9000"
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: access-key
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: secret-key
            - name: CORS_ORIGINS
              value: "https://nekazari.robotika.cloud,http://localhost:3000"
          startupProbe:
            httpGet:
              path: /health
              port: 8430
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 8430
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8430
            periodSeconds: 20
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
