# =============================================================================
# Greenhouse Digital Twin - Local Development with Docker Compose
# =============================================================================
# Runs the backend API locally. The frontend is a Vite dev server (pnpm run dev),
# not a Docker container — MF2 modules are loaded by the host at runtime.
#
# Usage:
#   docker-compose up        # Start backend
#   docker-compose up -d     # Start in background
#   docker-compose down      # Stop
#
# Required env: POSTGRES_URL, INTERNAL_SERVICE_SECRET
# =============================================================================

version: '3.8'

services:
  # Backend API server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8430:8420"
    environment:
      - APP_NAME=greenhouse-dt
      - DEBUG=true
      - API_PREFIX=/api/greenhouse
      - ORION_LD_URL=http://orion-ld-service:1026
      - REDIS_URL=redis://redis-service:6379/0
      - CORS_ORIGINS=["http://localhost:5003","http://localhost:5173"]
      - POSTGRES_URL=${POSTGRES_URL:?POSTGRES_URL is required}
      - INTERNAL_SERVICE_SECRET=${INTERNAL_SERVICE_SECRET:?INTERNAL_SERVICE_SECRET is required}
    volumes:
      - ./backend/app:/app/app:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8420/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    command: uvicorn app.main:app --host 0.0.0.0 --port 8420 --reload
